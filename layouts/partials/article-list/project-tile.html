{{ $image := partial "helper/image" (dict "Image" .Params.image "Resources" .Resources) }}
<article class="project-card {{ if $image }}has-image{{ end }}" data-project-type="{{ .Params.portfolioType | default "other" }}">
    <a href="{{ .RelPermalink }}">
        {{ if $image }}
            <div class="project-card__image">
                <img src="{{ $image.Permalink }}"
                    {{ with $image.Width }}width="{{ . }}"{{ end }}
                    {{ with $image.Height }}height="{{ . }}"{{ end }}
                    loading="lazy"
                    alt="Featured image of project {{ .Title }}">
            </div>
        {{ end }}
        <div class="project-card__content">
            <h2 class="project-card__title">{{ .Title }}</h2>
            {{ with .Params.description }}
                <p class="project-card__description">{{ . }}</p>
            {{ end }}
            {{ with .Params.tags }}
                <div class="project-card__tags">
                    {{ range . }}
                        <span class="project-card__tag">{{ . }}</span>
                    {{ end }}
                </div>
            {{ end }}
        </div>
    </a>
</article>
