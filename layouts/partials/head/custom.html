<script>
    (function () {
        try {
            if (!window.matchMedia || !window.matchMedia('(max-width: 767px)').matches) return;

            var normalizedPath = window.location.pathname.replace(/\/+$/, '') + '/';
            var isHome = normalizedPath === '/' || normalizedPath === '/en/';
            var fromSidebarMenu = window.sessionStorage && window.sessionStorage.getItem('leftjun-mobile-menu-nav') === '1';

            if (isHome || fromSidebarMenu) {
                document.documentElement.classList.add('mobile-menu-preopen');
            }
        } catch (error) {
            document.documentElement.classList.remove('mobile-menu-preopen');
        }
    })();
</script>
