<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Left Jun Site Editor</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">LJ</span>
      <div>
        <strong>Site Editor</strong>
        <small>Local Hugo content tool</small>
      </div>
    </div>

    <label class="field">
      <span>分区</span>
      <select id="sectionFilter">
        <option value="posts">文章 Posts</option>
        <option value="projects">项目 Projects</option>
        <option value="retrospectives">复盘 Retrospectives</option>
        <option value="plans">计划 Plans</option>
      </select>
    </label>

    <label class="field">
      <span>搜索</span>
      <input id="searchInput" type="search" placeholder="标题、slug、标签">
    </label>

    <div class="sidebar-actions">
      <button id="newButton" type="button">新建</button>
      <button id="refreshButton" type="button">刷新</button>
    </div>

    <ol id="contentList" class="content-list"></ol>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <p>本地工具</p>
        <h1>内容更新编辑器</h1>
      </div>
      <div class="topbar-actions">
        <button id="buildButton" type="button">运行 Hugo 构建</button>
        <button id="saveAsButton" type="button">另存为新内容</button>
        <button id="saveButton" type="button" class="primary">保存</button>
      </div>
    </header>

    <section class="panel status-panel">
      <div>
        <h2>头像小状态</h2>
        <p>编辑左侧栏头像旁的小状态，保存后写回 <code>hugo.yaml</code>。</p>
      </div>
      <div class="status-grid">
        <label><span>中文 emoji</span><input id="zhEmoji"></label>
        <label><span>中文标题</span><input id="zhTitle"></label>
        <label><span>中文描述</span><input id="zhDescription"></label>
        <label><span>English emoji</span><input id="enEmoji"></label>
        <label><span>English title</span><input id="enTitle"></label>
        <label><span>English description</span><input id="enDescription"></label>
      </div>
      <button id="saveStatusButton" type="button">保存状态</button>
    </section>

    <section class="panel editor-panel">
      <div class="form-grid">
        <label><span>当前文件</span><input id="pathField" readonly></label>
        <label><span>标题 title</span><input id="titleField"></label>
        <label><span>slug</span><input id="slugField"></label>
        <label><span>date</span><input id="dateField" placeholder="2026-05-27T10:00:00+08:00"></label>
        <label class="checkbox"><input id="draftField" type="checkbox"><span>draft</span></label>
        <label><span>description</span><textarea id="descriptionField" rows="3"></textarea></label>
        <label><span>image</span><input id="imageField" placeholder="cover.png"></label>
        <label><span>portfolioType</span><input id="portfolioTypeField" placeholder="game / embedded"></label>
        <label><span>categories（逗号或换行）</span><textarea id="categoriesField" rows="3"></textarea></label>
        <label><span>tags（逗号或换行）</span><textarea id="tagsField" rows="3"></textarea></label>
        <label><span>roleTags（项目页）</span><textarea id="roleTagsField" rows="3"></textarea></label>
      </div>

      <div class="split">
        <section>
          <h2>显式关联 relatedPages</h2>
          <p>勾选后写入 front matter；页面会优先显示这些关联。</p>
          <div id="relatedPicker" class="related-picker"></div>
        </section>
        <section>
          <h2>项目扩展字段</h2>
          <label><span>projectFacts JSON</span><textarea id="projectFactsField" rows="9" spellcheck="false"></textarea></label>
          <label><span>projectLinks JSON</span><textarea id="projectLinksField" rows="9" spellcheck="false"></textarea></label>
        </section>
      </div>

      <label class="body-editor">
        <span>Markdown 正文</span>
        <textarea id="bodyField" spellcheck="false"></textarea>
      </label>
    </section>

    <pre id="log" class="log" aria-live="polite"></pre>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
