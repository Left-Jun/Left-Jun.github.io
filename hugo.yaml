params:
  mainSections:
    - posts
  featuredImageField: "image"
  rssFullContent: true
  favicon: "/favicon.ico"
  homeTitle: "Left Jun - Gameplay Programmer & Indie Game Developer"
  description: "Left Jun 的个人游戏开发作品集，也是阈限开拓者 / Limenauts 的项目档案，记录 Unity / C# 游戏原型、Gameplay 系统、Game Jam 项目与软硬件实践。"
  keywords:
    - Left Jun
    - LeftJun
    - Limenauts
    - 阈限开拓者
    - Unity
    - C#
    - Gameplay Programmer
    - Technical Artist
    - 独立游戏开发
    - Emotion Mask
    - 亚舍拉挽歌
  opengraph:
    image: "img/avatar.jpg"
    imageAlt: "Left Jun"
    twitter:
      card: "summary_large_image"

  footer:
    since: 2026
    customText: "Built with Hugo"

  dateFormat:
    published: "2006-01-02"
    lastUpdated: "2006-01-02 15:04"

  sidebar:
    compact: false
    emoji: "👋"
    status:
      emoji: "💻"
      title: "专注中"
      description: "正在疯狂改 bug 调试。"
    subtitle: "四川大学电子信息本科生，阈限开拓者 / Limenauts 队长，持续做游戏原型、互动作品与软硬件项目。"
    avatar: "img/avatar.jpg"

  article:
    math: false
    toc: true
    readingTime: true

  comments:
    enabled: false
    provider: "giscus"
    giscus:
      repo: "Left-Jun/Left-Jun.github.io"
      repoID: ""
      category: "General"
      categoryID: ""
      mapping: "pathname"
      strict: 0
      reactionsEnabled: 1
      emitMetadata: 0
      inputPosition: "bottom"
      lightTheme: "light"
      darkTheme: "dark"
      loading: "lazy"

  widgets:
    homepage:
      - type: "categories"
        params:
          limit: 8
      - type: "tag-cloud"
        params:
          limit: 10
    page:
      - type: "toc"

  colorScheme:
    toggle: true
    default: "auto"
