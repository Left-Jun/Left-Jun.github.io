baseurl: "https://leftjun.com/"
languageCode: "zh-cn"
title: "Left Jun"

defaultContentLanguage: "zh-cn"
hasCJKLanguage: true

pagination:
  pagerSize: 6
  path: "page"

permalinks:
  posts: "/posts/:slug/"
  page: "/:slug/"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true
    style: "monokai"

caches:
